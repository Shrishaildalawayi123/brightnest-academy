<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrishail Academy - Frontend Test Suite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
        h1 { text-align: center; margin-bottom: 10px; color: #00d4ff; }
        .summary { text-align: center; margin-bottom: 20px; padding: 15px; background: #16213e; border-radius: 8px; font-size: 1.1rem; }
        .summary .pass { color: #4ade80; font-weight: bold; }
        .summary .fail { color: #f87171; font-weight: bold; }
        .summary .skip { color: #fbbf24; font-weight: bold; }
        .module { margin-bottom: 20px; background: #16213e; border-radius: 8px; overflow: hidden; }
        .module-header { padding: 12px 16px; background: #0f3460; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .module-header h2 { font-size: 1rem; color: #e0e0e0; }
        .module-header .badge { padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .badge-pass { background: #065f46; color: #4ade80; }
        .badge-fail { background: #7f1d1d; color: #f87171; }
        .test-list { padding: 0; }
        .test-item { padding: 8px 16px; border-bottom: 1px solid #1a1a2e; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .test-item:last-child { border-bottom: none; }
        .test-item.pass { border-left: 3px solid #4ade80; }
        .test-item.fail { border-left: 3px solid #f87171; background: #2d1b1b; }
        .test-name { flex: 1; }
        .test-status { margin-left: 10px; font-weight: bold; }
        .test-status.pass { color: #4ade80; }
        .test-status.fail { color: #f87171; }
        .error-msg { color: #fca5a5; font-size: 0.8rem; margin-top: 4px; font-family: monospace; white-space: pre-wrap; }
        .timer { text-align: center; color: #888; margin-top: 10px; font-size: 0.9rem; }
        .running { text-align: center; padding: 40px; font-size: 1.2rem; color: #00d4ff; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #00d4ff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
    </style>
</head>
<body>
    <h1>🎓 Shrishail Academy - Frontend Tests</h1>
    <div id="output"><div class="running"><span class="spinner"></span>Running tests...</div></div>

    <!-- Minimal DOM fixtures for app.js tests -->
    <div id="test-fixtures" style="display:none;">
        <div id="currentYear"></div>
        <div id="menuToggle"></div>
        <div id="navLinks"><a class="nav-link" href="#">Link</a></div>
        <div id="header"></div>
    </div>

    <script>
    // ===================== MINI TEST FRAMEWORK =====================
    const TestRunner = {
        modules: [],
        currentModule: null,

        describe(name, fn) {
            this.currentModule = { name, tests: [], passed: 0, failed: 0 };
            this.modules.push(this.currentModule);
            fn();
            this.currentModule = null;
        },

        it(name, fn) {
            this.currentModule.tests.push({ name, fn, status: 'pending', error: null });
        },

        async itAsync(name, fn) {
            this.it(name, fn);
        },

        async run() {
            for (const module of this.modules) {
                for (const test of module.tests) {
                    try {
                        const result = test.fn();
                        if (result && typeof result.then === 'function') {
                            await result;
                        }
                        test.status = 'pass';
                        module.passed++;
                    } catch (e) {
                        test.status = 'fail';
                        test.error = e && e.message ? e.message : String(e);
                        module.failed++;
                    }
                }
            }
        },

        assertEqual(actual, expected, msg = '') {
            if (actual !== expected) {
                throw new Error(`${msg ? msg + ': ' : ''}Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
            }
        },

        assertDeepEqual(actual, expected, msg = '') {
            if (JSON.stringify(actual) !== JSON.stringify(expected)) {
                throw new Error(`${msg ? msg + ': ' : ''}Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
            }
        },

        assertTrue(value, msg = '') {
            if (!value) throw new Error(`${msg ? msg + ': ' : ''}Expected truthy value, got ${JSON.stringify(value)}`);
        },

        assertFalse(value, msg = '') {
            if (value) throw new Error(`${msg ? msg + ': ' : ''}Expected falsy value, got ${JSON.stringify(value)}`);
        },

        assertThrows(fn, msg = '') {
            let threw = false;
            try { fn(); } catch (e) { threw = true; }
            if (!threw) throw new Error(`${msg ? msg + ': ' : ''}Expected function to throw`);
        },

        async assertRejects(fn, msg = '') {
            let threw = false;
            try { await fn(); } catch (e) { threw = true; }
            if (!threw) throw new Error(`${msg ? msg + ': ' : ''}Expected async function to reject`);
        },

        assertContains(str, substr, msg = '') {
            if (!str.includes(substr)) {
                throw new Error(`${msg ? msg + ': ' : ''}Expected "${str}" to contain "${substr}"`);
            }
        },

        assertType(value, type, msg = '') {
            if (typeof value !== type) {
                throw new Error(`${msg ? msg + ': ' : ''}Expected type ${type}, got ${typeof value}`);
            }
        },

        render() {
            let totalPassed = 0, totalFailed = 0, totalTests = 0;
            this.modules.forEach(m => {
                totalPassed += m.passed;
                totalFailed += m.failed;
                totalTests += m.tests.length;
            });

            let html = `<div class="summary">
                Total: <strong>${totalTests}</strong> tests |
                <span class="pass">✓ ${totalPassed} passed</span> |
                <span class="fail">✗ ${totalFailed} failed</span>
            </div>`;

            this.modules.forEach(m => {
                const allPass = m.failed === 0;
                html += `<div class="module">
                    <div class="module-header">
                        <h2>${allPass ? '✓' : '✗'} ${m.name}</h2>
                        <span class="badge ${allPass ? 'badge-pass' : 'badge-fail'}">
                            ${m.passed}/${m.tests.length} passed
                        </span>
                    </div>
                    <div class="test-list">`;
                m.tests.forEach(t => {
                    html += `<div class="test-item ${t.status}">
                        <span class="test-name">${t.status === 'pass' ? '✓' : '✗'} ${t.name}</span>
                        <span class="test-status ${t.status}">${t.status.toUpperCase()}</span>
                    </div>`;
                    if (t.error) {
                        html += `<div class="test-item fail"><span class="error-msg">  → ${t.error}</span></div>`;
                    }
                });
                html += `</div></div>`;
            });

            document.getElementById('output').innerHTML = html;
        }
    };

    const { describe, it, itAsync, assertEqual, assertTrue, assertFalse, assertThrows,
            assertRejects, assertContains, assertType, assertDeepEqual } =
        Object.fromEntries(Object.entries({
            describe: TestRunner.describe.bind(TestRunner),
            it: TestRunner.it.bind(TestRunner),
            itAsync: TestRunner.itAsync.bind(TestRunner),
            assertEqual: TestRunner.assertEqual.bind(TestRunner),
            assertTrue: TestRunner.assertTrue.bind(TestRunner),
            assertFalse: TestRunner.assertFalse.bind(TestRunner),
            assertThrows: TestRunner.assertThrows.bind(TestRunner),
            assertRejects: TestRunner.assertRejects.bind(TestRunner),
            assertContains: TestRunner.assertContains.bind(TestRunner),
            assertType: TestRunner.assertType.bind(TestRunner),
            assertDeepEqual: TestRunner.assertDeepEqual.bind(TestRunner),
        }));

    // ==================== MOCK HELPERS ====================
    function mockLocalStorage() {
        const store = {};
        return {
            getItem: (key) => store[key] || null,
            setItem: (key, value) => { store[key] = String(value); },
            removeItem: (key) => { delete store[key]; },
            clear: () => { Object.keys(store).forEach(k => delete store[k]); },
            _store: store
        };
    }

    function mockFetch(responseData, ok = true, status = 200) {
        return function fakeFetch(url, options) {
            return Promise.resolve({
                ok,
                status,
                json: () => Promise.resolve(responseData),
                text: () => Promise.resolve(JSON.stringify(responseData))
            });
        };
    }
    </script>

    <script>
    // ===================== AUTH.JS TESTS =====================
    (function runAuthTests() {
        const origLS = window.localStorage;

        describe('Auth Module', () => {

            it('isLoggedIn() returns false when no user', () => {
                const mock = mockLocalStorage();
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                assertFalse(Auth.isLoggedIn(), 'Should not be logged in without user');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('isLoggedIn() returns true when user exists', () => {
                const mock = mockLocalStorage();
                mock.setItem('user', JSON.stringify({ id: 1, role: 'STUDENT' }));
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                assertTrue(Auth.isLoggedIn(), 'Should be logged in with user');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('getCurrentUser() returns null when no user stored', () => {
                const mock = mockLocalStorage();
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                assertEqual(Auth.getCurrentUser(), null, 'Should return null');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('getCurrentUser() returns parsed user object', () => {
                const mock = mockLocalStorage();
                const user = { id: 1, name: 'Test', email: 'test@test.com', role: 'STUDENT' };
                mock.setItem('user', JSON.stringify(user));
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                assertDeepEqual(Auth.getCurrentUser(), user, 'Should return user object');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('isAdmin() returns true for ADMIN role', () => {
                const mock = mockLocalStorage();
                mock.setItem('user', JSON.stringify({ role: 'ADMIN' }));
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                assertTrue(Auth.isAdmin(), 'Should be admin');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('isAdmin() returns false for STUDENT role', () => {
                const mock = mockLocalStorage();
                mock.setItem('user', JSON.stringify({ role: 'STUDENT' }));
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                assertFalse(Auth.isAdmin(), 'Should not be admin');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('isAdmin() returns false when no user', () => {
                const mock = mockLocalStorage();
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                assertFalse(Auth.isAdmin(), 'Should not be admin when no user');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('isStudent() returns true for STUDENT role', () => {
                const mock = mockLocalStorage();
                mock.setItem('user', JSON.stringify({ role: 'STUDENT' }));
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                assertTrue(Auth.isStudent(), 'Should be student');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('isStudent() returns false for ADMIN role', () => {
                const mock = mockLocalStorage();
                mock.setItem('user', JSON.stringify({ role: 'ADMIN' }));
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                assertFalse(Auth.isStudent(), 'Should not be student');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('logout() clears token and user from storage', () => {
                const mock = mockLocalStorage();
                mock.setItem('token', 'abc123');
                mock.setItem('user', '{"name":"Test"}');
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                // Override location to prevent actual redirect
                const origLocation = window.location;
                delete window.location;
                window.location = { href: '' };
                Auth.logout();
                assertEqual(mock.getItem('token'), null, 'Token should be removed');
                assertEqual(mock.getItem('user'), null, 'User should be removed');
                window.location = origLocation;
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('logout() redirects to index.html', () => {
                const mock = mockLocalStorage();
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                const origLocation = window.location;
                delete window.location;
                window.location = { href: '' };
                Auth.logout();
                assertEqual(window.location.href, 'index.html', 'Should redirect to index.html');
                window.location = origLocation;
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('requireAuth() redirects when not logged in', () => {
                const mock = mockLocalStorage();
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                const origLocation = window.location;
                delete window.location;
                window.location = { href: '' };
                Auth.requireAuth();
                assertEqual(window.location.href, 'login.html', 'Should redirect to login.html');
                window.location = origLocation;
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('requireAdmin() redirects non-admin to index', () => {
                const mock = mockLocalStorage();
                mock.setItem('user', JSON.stringify({ role: 'STUDENT' }));
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                const origLocation = window.location;
                delete window.location;
                window.location = { href: '' };
                Auth.requireAdmin();
                assertEqual(window.location.href, 'index.html', 'Should redirect non-admin');
                window.location = origLocation;
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('Auth is exported on window', () => {
                assertTrue(window.Auth !== undefined, 'Auth should be on window');
                assertType(window.Auth.login, 'function', 'login should be a function');
                assertType(window.Auth.logout, 'function', 'logout should be a function');
                assertType(window.Auth.register, 'function', 'register should be a function');
            });
        });
    })();

    // ===================== API.JS TESTS =====================
    (function runApiTests() {
        const origLS = window.localStorage;
        const origFetch = window.fetch;

        describe('API Module - Token & Headers', () => {

            it('getToken() returns null when no token', () => {
                const mock = mockLocalStorage();
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                assertEqual(API.getToken(), null, 'Should return null');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('getToken() returns stored token', () => {
                const mock = mockLocalStorage();
                mock.setItem('token', 'mytoken123');
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                assertEqual(API.getToken(), 'mytoken123', 'Should return token');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('getHeaders() without auth returns Content-Type only', () => {
                const headers = API.getHeaders();
                assertEqual(headers['Content-Type'], 'application/json');
                assertEqual(headers['Authorization'], undefined, 'No auth header');
            });

            it('getHeaders(true) includes Authorization when token exists', () => {
                const mock = mockLocalStorage();
                mock.setItem('token', 'bearer-token');
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                const headers = API.getHeaders(true);
                assertEqual(headers['Content-Type'], 'application/json');
                assertEqual(headers['Authorization'], 'Bearer bearer-token');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('getHeaders(true) omits Authorization when no token', () => {
                const mock = mockLocalStorage();
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                const headers = API.getHeaders(true);
                assertEqual(headers['Authorization'], undefined, 'No auth when no token');
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('API is exported on window', () => {
                assertTrue(window.API !== undefined, 'API should be on window');
                assertType(window.API.request, 'function');
                assertType(window.API.getCourses, 'function');
            });
        });

        describe('API Module - HTTP Request', () => {

            it('request() calls fetch with correct URL', async () => {
                let capturedUrl = '';
                window.fetch = (url, opts) => {
                    capturedUrl = url;
                    return Promise.resolve({ ok: true, json: () => Promise.resolve({ data: 'test' }) });
                };
                await API.request('/test-endpoint', { method: 'GET' });
                assertContains(capturedUrl, '/test-endpoint');
                window.fetch = origFetch;
            });

            it('request() returns parsed JSON on success', async () => {
                window.fetch = mockFetch({ message: 'hello' });
                const result = await API.request('/test');
                assertEqual(result.message, 'hello');
                window.fetch = origFetch;
            });

            it('request() throws on non-ok response', async () => {
                window.fetch = mockFetch({ message: 'Unauthorized' }, false, 401);
                await assertRejects(() => API.request('/test'), 'Should throw on 401');
                window.fetch = origFetch;
            });

            it('request() throws with error message from response', async () => {
                window.fetch = mockFetch({ message: 'Not found' }, false, 404);
                let errorMsg = '';
                try { await API.request('/test'); } catch (e) { errorMsg = e.message; }
                assertEqual(errorMsg, 'Not found');
                window.fetch = origFetch;
            });

            it('request() handles non-JSON error response', async () => {
                window.fetch = (url, opts) => Promise.resolve({
                    ok: false,
                    status: 500,
                    json: () => Promise.reject(new Error('not json'))
                });
                let errorMsg = '';
                try { await API.request('/test'); } catch (e) { errorMsg = e.message; }
                assertEqual(errorMsg, 'Request failed');
                window.fetch = origFetch;
            });
        });

        describe('API Module - Auth Endpoints', () => {

            it('register() sends POST to /auth/register', async () => {
                let capturedUrl = '', capturedMethod = '', capturedBody = '';
                window.fetch = (url, opts) => {
                    capturedUrl = url; capturedMethod = opts.method;
                    capturedBody = opts.body;
                    return Promise.resolve({ ok: true, json: () => Promise.resolve({ id: 1 }) });
                };
                await API.register({ name: 'Test', email: 'test@test.com' });
                assertContains(capturedUrl, '/auth/register');
                assertEqual(capturedMethod, 'POST');
                assertContains(capturedBody, 'test@test.com');
                window.fetch = origFetch;
            });

            it('login() sends POST to /auth/login with credentials', async () => {
                let capturedUrl = '', capturedBody = '';
                window.fetch = (url, opts) => {
                    capturedUrl = url; capturedBody = opts.body;
                    return Promise.resolve({ ok: true, json: () => Promise.resolve({ token: 't' }) });
                };
                await API.login('user@test.com', 'pass123');
                assertContains(capturedUrl, '/auth/login');
                assertContains(capturedBody, 'user@test.com');
                assertContains(capturedBody, 'pass123');
                window.fetch = origFetch;
            });
        });

                window.fetch = (url, opts) => {
                    capturedUrl = url; capturedMethod = opts.method;
                    return Promise.resolve({ ok: true, json: () => Promise.resolve([]) });

                await API.getCourses();
                assertContains(capturedUrl, '/courses');
                assertEqual(capturedMethod, 'GET');
                window.fetch = origFetch;
            });

            it('getCourse(id) sends GET to /courses/:id', async () => {

                window.fetch = (url, opts) => {
                    capturedUrl = url;
                    return Promise.resolve({ ok: true, json: () => Promise.resolve({}) });
                };
                await API.getCourse(42);
                assertContains(capturedUrl, '/courses/42');
                window.fetch = origFetch;
            });

            it('createCourse() sends POST with auth header', async () => {

                mock.setItem('token', 'admin-token');
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                let capturedHeaders = {};

                };
                await API.createCourse({ name: 'Math' });
                assertEqual(capturedHeaders['Authorization'], 'Bearer admin-token');
                window.fetch = origFetch;
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });

            it('updateCourse() sends PUT to /courses/:id', async () => {
                let capturedUrl = '', capturedMethod = '';
                const mock = mockLocalStorage();
                mock.setItem('token', 'tk');
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                window.fetch = (url, opts) => {
                    capturedUrl = url; capturedMethod = opts.method;
                    return Promise.resolve({ ok: true, json: () => Promise.resolve({}) });
                };
                await API.updateCourse(5, { name: 'Science' });
                assertContains(capturedUrl, '/courses/5');
                assertEqual(capturedMethod, 'PUT');
                window.fetch = origFetch;
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('deleteCourse() sends DELETE to /courses/:id', async () => {
                let capturedUrl = '', capturedMethod = '';
                const mock = mockLocalStorage();
                mock.setItem('token', 'tk');
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                window.fetch = (url, opts) => {
                    capturedUrl = url; capturedMethod = opts.method;
                    return Promise.resolve({ ok: true, json: () => Promise.resolve({}) });
                };
                await API.deleteCourse(10);
                assertContains(capturedUrl, '/courses/10');
                assertEqual(capturedMethod, 'DELETE');
                window.fetch = origFetch;
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });
        });

        describe('API Module - Enrollment Endpoints', () => {

            it('enrollInCourse() sends POST to /enrollments/:courseId', async () => {
                let capturedUrl = '', capturedMethod = '';
                const mock = mockLocalStorage();
                mock.setItem('token', 'tk');
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                window.fetch = (url, opts) => {
                    capturedUrl = url; capturedMethod = opts.method;
                    return Promise.resolve({ ok: true, json: () => Promise.resolve({}) });
                };
                await API.enrollInCourse(7);
                assertContains(capturedUrl, '/enrollments/7');
                assertEqual(capturedMethod, 'POST');
                window.fetch = origFetch;
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('getMyEnrollments() sends GET to /enrollments/my-courses', async () => {
                let capturedUrl = '';
                const mock = mockLocalStorage();
                mock.setItem('token', 'tk');
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });
                window.fetch = (url, opts) => {
                    capturedUrl = url;
                    return Promise.resolve({ ok: true, json: () => Promise.resolve([]) });
                };
                await API.getMyEnrollments();
                assertContains(capturedUrl, '/enrollments/my-courses');
                window.fetch = origFetch;
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('getAllEnrollments() sends GET to /enrollments', async () => {
                let capturedUrl = '';
                const mock = mockLocalStorage();
                mock.setItem('token', 'tk');
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });

    // ===================== APP.JS TESTS =====================
    (function runAppTests() {

        describe('App Module - Utility Functions', () => {

            it('formatDate() formats date correctly', () => {
                const result = formatDate('2026-01-15');
                assertContains(result, '2026');
                assertContains(result, 'January');
                assertContains(result, '15');
            });

            it('formatDate() handles different date strings', () => {
                const result = formatDate('2025-12-25');
                assertContains(result, 'December');
                assertContains(result, '25');
                assertContains(result, '2025');
            });

            it('truncateText() returns full text if under limit', () => {
                assertEqual(truncateText('Hello', 100), 'Hello');
            });

            it('truncateText() truncates long text with ellipsis', () => {
                const text = 'A'.repeat(200);
                const truncated = truncateText(text, 100);
                assertEqual(truncated.length, 103); // 100 + '...'
                assertContains(truncated, '...');
            });

            it('truncateText() uses default maxLength of 100', () => {
                const text = 'B'.repeat(200);
                const truncated = truncateText(text);
                assertEqual(truncated.length, 103);
            });

            it('truncateText() returns exact text if equal to limit', () => {
                const text = 'C'.repeat(100);
                assertEqual(truncateText(text, 100), text);
            });

            it('debounce() returns a function', () => {
                const fn = debounce(() => {});
                assertType(fn, 'function');
            });

            it('AppUtils is exported on window', () => {
                assertTrue(window.AppUtils !== undefined, 'AppUtils should be on window');
                assertType(window.AppUtils.formatDate, 'function');
                assertType(window.AppUtils.truncateText, 'function');
                assertType(window.AppUtils.debounce, 'function');
                assertType(window.AppUtils.showNotification, 'function');
                assertType(window.AppUtils.setButtonLoading, 'function');
            });
        });

        describe('App Module - Form Validation', () => {

            it('validateField() fails on empty required field', () => {
                const input = document.createElement('input');
                input.setAttribute('required', '');
                input.value = '';
                const container = document.createElement('div');
                container.appendChild(input);
                const result = validateField(input);
                assertFalse(result, 'Empty required field should fail');
            });

            it('validateField() passes on filled required field', () => {
                const input = document.createElement('input');
                input.setAttribute('required', '');
                input.type = 'text';
                input.value = 'Hello';
                const container = document.createElement('div');
                container.appendChild(input);
                const result = validateField(input);
                assertTrue(result, 'Filled required field should pass');
            });

            it('validateField() fails on invalid email', () => {
                const input = document.createElement('input');
                input.type = 'email';
                input.value = 'notanemail';
                const container = document.createElement('div');
                container.appendChild(input);
                const result = validateField(input);
                assertFalse(result, 'Invalid email should fail');
            });

            it('validateField() passes on valid email', () => {
                const input = document.createElement('input');
                input.type = 'email';
                input.value = 'test@example.com';
                const container = document.createElement('div');
                container.appendChild(input);
                const result = validateField(input);
                assertTrue(result, 'Valid email should pass');
            });

            it('validateField() fails on short password', () => {
                const input = document.createElement('input');
                input.type = 'password';
                input.value = 'abc';
                const container = document.createElement('div');
                container.appendChild(input);
                const result = validateField(input);
                assertFalse(result, 'Short password should fail');
            });

            it('validateField() passes on valid password', () => {
                const input = document.createElement('input');
                input.type = 'password';
                input.value = 'Valid@Pass123';
                const container = document.createElement('div');
                container.appendChild(input);
                const result = validateField(input);
                assertTrue(result, 'Valid password should pass');
            });

            it('validateField() fails when password is missing special character', () => {
                const input = document.createElement('input');
                input.type = 'password';
                input.value = 'Password123';
                const container = document.createElement('div');
                container.appendChild(input);
                const result = validateField(input);
                assertFalse(result, 'Password missing special character should fail');
            });

            it('validateField() fails on invalid phone', () => {
                const input = document.createElement('input');
                input.type = 'tel';
                input.value = 'abc-not-phone';
                const container = document.createElement('div');
                container.appendChild(input);
                const result = validateField(input);
                assertFalse(result, 'Invalid phone should fail');
            });

            it('validateField() passes on valid phone', () => {
                const input = document.createElement('input');
                input.type = 'tel';
                input.value = '+91 98765 43210';
                const container = document.createElement('div');
                container.appendChild(input);
                const result = validateField(input);
                assertTrue(result, 'Valid phone should pass');
            });

            it('showFieldError() adds error class and message', () => {
                const input = document.createElement('input');
                const container = document.createElement('div');
                container.appendChild(input);
                showFieldError(input, 'Test error');
                assertTrue(input.classList.contains('error'), 'Should have error class');
                const errorDiv = container.querySelector('.field-error');
                assertTrue(errorDiv !== null, 'Error div should exist');
                assertEqual(errorDiv.textContent, 'Test error');
            });

            it('clearFieldError() removes error class and message', () => {
                const input = document.createElement('input');
                const container = document.createElement('div');
                container.appendChild(input);
                showFieldError(input, 'Test error');
                clearFieldError(input);
                assertFalse(input.classList.contains('error'), 'Error class should be removed');
                assertEqual(container.querySelector('.field-error'), null, 'Error div should be removed');
            });

            it('validateForm() validates all required fields', () => {
                const form = document.createElement('form');
                const input1 = document.createElement('input');
                input1.setAttribute('required', '');
                input1.value = 'filled';
                const div1 = document.createElement('div');
                div1.appendChild(input1);
                form.appendChild(div1);

                const input2 = document.createElement('input');
                input2.setAttribute('required', '');
                input2.value = '';
                const div2 = document.createElement('div');
                div2.appendChild(input2);
                form.appendChild(div2);

                assertFalse(validateForm(form), 'Form with empty required field should fail');
            });
        });

        describe('App Module - Button Loading', () => {

            it('setButtonLoading(true) disables button and shows loading', () => {
                const btn = document.createElement('button');
                btn.textContent = 'Submit';
                setButtonLoading(btn, true);
                assertTrue(btn.disabled, 'Button should be disabled');
                assertContains(btn.innerHTML, 'Loading');
            });

            it('setButtonLoading(false) re-enables button', () => {
                const btn = document.createElement('button');
                btn.textContent = 'Submit';
                setButtonLoading(btn, true);
                setButtonLoading(btn, false);
                assertFalse(btn.disabled, 'Button should be enabled');
                assertEqual(btn.textContent, 'Submit');
            });
        });

        describe('App Module - Notifications', () => {

            it('showNotification() creates notification element', () => {
                showNotification('Test message', 'success');
                const notif = document.querySelector('.notification-success');
                assertTrue(notif !== null, 'Notification should be created');
                assertEqual(notif.textContent, 'Test message');
                notif.remove(); // cleanup
            });

            it('showNotification() uses correct color for error type', () => {
                showNotification('Error!', 'error');
                const notif = document.querySelector('.notification-error');
                assertTrue(notif !== null, 'Error notification should be created');
                assertContains(notif.style.background, '239, 68, 68'); // #EF4444 in rgb
                notif.remove();
            });

            it('showNotification() uses correct color for info type', () => {
                showNotification('Info', 'info');
                const notif = document.querySelector('.notification-info');
                assertTrue(notif !== null, 'Info notification should be created');
                notif.remove();
            });
        });

        describe('App Module - Auth Integration', () => {

            it('Auth login() stores user data', async () => {
                const origFetch = window.fetch;
                const origLS = window.localStorage;
                const mock = mockLocalStorage();
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });

                window.fetch = mockFetch({
                    token: 'jwt-token-123',
                    id: 1,
                    name: 'Test User',
                    email: 'test@test.com',
                    role: 'STUDENT'
                });

                await Auth.login('test@test.com', 'password');

                const user = JSON.parse(mock.getItem('user'));
                assertEqual(user.name, 'Test User');
                assertEqual(user.email, 'test@test.com');
                assertEqual(user.role, 'STUDENT');

                window.fetch = origFetch;
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('Auth register() stores user data', async () => {
                const origFetch = window.fetch;
                const origLS = window.localStorage;
                const mock = mockLocalStorage();
                Object.defineProperty(window, 'localStorage', { value: mock, writable: true, configurable: true });

                window.fetch = mockFetch({
                    token: 'reg-token',
                    id: 2,
                    name: 'New User',
                    email: 'new@test.com',
                    role: 'STUDENT'
                });

                await Auth.register({ name: 'New User', email: 'new@test.com', password: 'pass' });

                const user = JSON.parse(mock.getItem('user'));
                assertEqual(user.name, 'New User');

                window.fetch = origFetch;
                Object.defineProperty(window, 'localStorage', { value: origLS, writable: true, configurable: true });
            });

            it('Auth login() propagates API errors', async () => {
                const origFetch = window.fetch;
                window.fetch = mockFetch({ message: 'Invalid credentials' }, false, 401);

                let errorCaught = false;
                try {
                    await Auth.login('bad@test.com', 'wrong');
                } catch (e) {
                    errorCaught = true;
                    assertEqual(e.message, 'Invalid credentials');
                }
                assertTrue(errorCaught, 'Should throw on failed login');

                window.fetch = origFetch;
            });
        });
    })();

    // ===================== RENDER RESULTS =====================
    (async () => {
        await TestRunner.run();
        TestRunner.render();
        const totalPassed = TestRunner.modules.reduce((s, m) => s + m.passed, 0);

        console.log(`\n✅ Test Results: ${totalPassed} passed, ${totalFailed} failed out of ${totalPassed + totalFailed} total`);
        if (totalFailed === 0) {
            console.log('🎉 All tests passed!');
        }
    })();
    </script>
