# docker-compose.prod.yml - Production Docker Compose with resource limits
# Usage: docker-compose -f docker-compose.prod.yml up -d

version: "3.8"
services:
  app:
    build: .
    container_name: brightnest-academy
    ports:
      # bind only to localhost; use Nginx reverse-proxy for public access
      - "127.0.0.1:8080:8080"
    env_file:
      # On the server, create this file with secrets (DB creds, JWT_SECRET, admin creds)
      - /opt/brightnest/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-brightnest_academy}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - HTTPS_REQUIRED=true
      - COOKIE_SECURE=true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -fsS http://127.0.0.1:8080/health | grep -q ''"status"'' || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=100M
    security_opt:
      - no-new-privileges:true
