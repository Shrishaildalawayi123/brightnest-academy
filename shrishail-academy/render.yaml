# =============================================
# Render Blueprint - BrightNest Academy
# Deploy: Connect GitHub repo → Render auto-detects this file
# =============================================

services:
  - type: web
    name: brightnest-academy
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/brightnest-academy
    region: singapore  # closest to India
    plan: starter
    branch: main
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        sync: false  # Set manually in Render dashboard
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: brightnest_academy
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_USE_SSL
        value: true
      - key: JWT_SECRET
        generateValue: true  # Render generates a secure random value
      - key: JWT_EXPIRATION
        value: 3600000
      - key: ADMIN_EMAIL
        value: admin@brightnest-academy.com
      - key: ADMIN_PASSWORD
        sync: false  # Set a strong password manually
      - key: JPA_DDL_AUTO
        value: validate
      - key: CORS_ORIGINS
        value: https://brightnest-academy.com,https://www.brightnest-academy.com
      - key: RATE_LIMIT_LOGIN
        value: 5
      - key: RATE_LIMIT_WINDOW
        value: 60
      - key: WHATSAPP_ENABLED
        value: false
      - key: JAVA_TOOL_OPTIONS
        value: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: HTTPS_REQUIRED
        value: true
