name: Deploy to AWS (Docker Hub)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-yml-prod-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/brightnest-academy

jobs:
  build-test:
    name: Build + Test (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shrishail-academy

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: shrishail_academy
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: shrishail_academy
          DB_USER: root
          DB_PASS: testroot
          JWT_SECRET: CI-Test-Secret-Key-Must-Be-At-Least-64-Characters-Long-For-HS512-Algorithm!!
        run: mvn -B clean verify -Dspring.profiles.active=test

  docker-build-push:
    name: Build + Push Docker image
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./shrishail-academy
          file: ./shrishail-academy/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  security-scan-trivy-image:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Scan pushed image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

  deploy-ec2:
    name: SSH Deploy to EC2
    runs-on: ubuntu-latest
    needs: [docker-build-push, security-scan-trivy-image]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "shrishail-academy/docker-compose.prod.yml"
          target: "/opt/brightnest"

      - name: Write /opt/brightnest/.env from GitHub Secrets
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            mkdir -p /opt/brightnest
            # Write .env atomically (tmp file then move = no partial reads)
            cat > /opt/brightnest/.env.tmp << 'ENVEOF'
            SPRING_PROFILES_ACTIVE=prod
            DB_HOST=${{ secrets.PROD_DB_HOST }}
            DB_PORT=3306
            DB_NAME=brightnest_academy
            DB_USER=brightnest_app
            DB_PASS=${{ secrets.PROD_DB_PASS }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            JWT_EXPIRATION=3600000
            JWT_REFRESH_PEPPER=${{ secrets.PROD_JWT_REFRESH_PEPPER }}
            ADMIN_EMAIL=${{ secrets.PROD_ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.PROD_ADMIN_PASSWORD }}
            PORT=8080
            HTTPS_REQUIRED=true
            COOKIE_SECURE=true
            CORS_ORIGINS=${{ secrets.PROD_CORS_ORIGINS }}
            REDIS_HOST=${{ secrets.PROD_REDIS_HOST }}
            REDIS_PORT=6379
            RATE_LIMIT_BACKEND=${{ secrets.PROD_REDIS_HOST != '' && 'redis' || 'inmemory' }}
            HIKARI_MAX_POOL=15
            HIKARI_MIN_IDLE=5
            ENVEOF
            chmod 600 /opt/brightnest/.env.tmp
            mv /opt/brightnest/.env.tmp /opt/brightnest/.env

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            mkdir -p /opt/brightnest

            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            NEW_IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"
            PREVIOUS_IMAGE=""

            if docker ps -a --format '{{.Names}}' | grep -q '^brightnest-academy$'; then
              PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' brightnest-academy || true)
            fi

            # Normalize compose file location
            if [ -f /opt/brightnest/shrishail-academy/docker-compose.prod.yml ]; then
              mv /opt/brightnest/shrishail-academy/docker-compose.prod.yml /opt/brightnest/docker-compose.yml
              rm -rf /opt/brightnest/shrishail-academy || true
            elif [ -f /opt/brightnest/docker-compose.prod.yml ]; then
              mv /opt/brightnest/docker-compose.prod.yml /opt/brightnest/docker-compose.yml
            fi

            # Ensure the compose file uses the Docker Hub image
            sed -i "s|^[[:space:]]*build:[[:space:]]*\.[[:space:]]*$|    image: ${IMAGE_NAME}:latest|" /opt/brightnest/docker-compose.yml || true
            sed -i "s|^[[:space:]]*build:[[:space:]]*$|    image: ${IMAGE_NAME}:latest|" /opt/brightnest/docker-compose.yml || true

            # If the compose file already has image, overwrite it
            if grep -q "^[[:space:]]*image:" /opt/brightnest/docker-compose.yml; then
              sed -i "s|^[[:space:]]*image:.*|    image: ${NEW_IMAGE}|" /opt/brightnest/docker-compose.yml
            else
              # Insert image under service app: if missing
              awk 'BEGIN{ins=0} /^[[:space:]]*app:[[:space:]]*$/{print; print "    image: '${NEW_IMAGE}'"; ins=1; next} {print}' /opt/brightnest/docker-compose.yml > /opt/brightnest/docker-compose.tmp.yml
              mv /opt/brightnest/docker-compose.tmp.yml /opt/brightnest/docker-compose.yml
            fi

            # Pull and restart
            cd /opt/brightnest
            docker compose pull
            docker compose up -d

            HEALTH_OK=false
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
                HEALTH_OK=true
                break
              fi
              sleep 5
            done

            if [ "${HEALTH_OK}" != "true" ]; then
              echo "Deployment failed health check, attempting rollback"
              if [ -n "${PREVIOUS_IMAGE}" ]; then
                sed -i "s|^[[:space:]]*image:.*|    image: ${PREVIOUS_IMAGE}|" /opt/brightnest/docker-compose.yml
                docker compose pull || true
                docker compose up -d
              fi
              exit 1
            fi

            docker image prune -f || true
            echo "Deploy complete."
