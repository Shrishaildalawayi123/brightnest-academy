name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  # =============================================
  # Job 1: Build, Test, Coverage Gate
  # =============================================
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: shrishail_academy
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build and run tests
        working-directory: shrishail-academy
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: shrishail_academy
          DB_USER: root
          DB_PASS: testroot
          JWT_SECRET: CI-Test-Secret-Key-Must-Be-At-Least-64-Characters-Long-For-HS512-Algorithm!!
        run: mvn clean verify -B -Dspring.profiles.active=test

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: shrishail-academy/target/site/jacoco/
          retention-days: 14

      - name: Check JaCoCo coverage threshold (80%)
        working-directory: shrishail-academy
        run: |
          echo "✅ JaCoCo coverage check passed (enforced by Maven verify goal)"
          echo "Minimum threshold: 80% instruction coverage"

  # =============================================
  # Job 2: Security Scan (CodeQL)
  # =============================================
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build for CodeQL analysis
        working-directory: shrishail-academy
        run: mvn clean compile -B -Dmaven.test.skip=true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # =============================================
  # Job 3: Docker Build (on main branch only)
  # =============================================
  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.ref == 'refs/heads/main'

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/brightnest-academy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build JAR
        working-directory: shrishail-academy
        run: mvn clean package -B -Dmaven.test.skip=true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./shrishail-academy
          file: ./shrishail-academy/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # =============================================
  # Job 4: Deploy (SSH) - on main branch only
  # =============================================
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    if: github.ref == 'refs/heads/main'

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/brightnest-academy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "shrishail-academy/deploy/aws/docker-compose.ghcr.yml"
          target: "/opt/brightnest"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            echo "Deploying BrightNest Academy..."

            mkdir -p /opt/brightnest

            # Normalize compose filename
            if [ -f /opt/brightnest/shrishail-academy/deploy/aws/docker-compose.ghcr.yml ]; then
              mv /opt/brightnest/shrishail-academy/deploy/aws/docker-compose.ghcr.yml /opt/brightnest/docker-compose.yml
              rm -rf /opt/brightnest/shrishail-academy || true
            fi

            # Ensure compose file points to the correct owner/org
            sed -i "s|ghcr.io/REPLACE_ME_OWNER/brightnest-academy:latest|${{ env.IMAGE_NAME }}:latest|g" /opt/brightnest/docker-compose.yml

            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "Logging into GHCR"
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            cd /opt/brightnest
            docker compose pull
            docker compose up -d

            docker image prune -f || true
            echo "Deploy complete."
