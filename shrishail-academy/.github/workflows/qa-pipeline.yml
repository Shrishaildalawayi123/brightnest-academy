name: QA Pipeline

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"

jobs:
  backend-tests:
    name: Backend Tests + Coverage Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shrishail-academy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        run: mvn -B clean verify -Dspring.profiles.active=test

  frontend-unit:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        working-directory: shrishail-academy/qa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test:unit

  e2e-browser:
    name: Browser E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit]
    defaults:
      run:
        working-directory: shrishail-academy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build backend artifact
        run: mvn -B -DskipTests -Djacoco.skip=true package

      - name: Start backend server (test profile)
        run: |
          java -jar target/*.jar --spring.profiles.active=test > app.log 2>&1 &

      - name: Wait for health endpoint
        run: |
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed health check in time"
          cat app.log
          exit 1

      - name: Install QA dependencies
        run: cd qa && npm install

      - name: Install Playwright browsers
        run: cd qa && npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        env:
          E2E_BASE_URL: http://127.0.0.1:8080
        run: |
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            cd qa && CROSS_BROWSER=true npm run test:e2e
          else
            cd qa && npm run test:e2e:chromium
          fi

      - name: Print backend logs
        if: always()
        run: cat app.log || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: shrishail-academy/qa/playwright-report
          if-no-files-found: ignore

  performance-smoke:
    name: k6 Smoke Performance
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        working-directory: shrishail-academy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Build backend artifact
        run: mvn -B -DskipTests -Djacoco.skip=true package

      - name: Start backend server (test profile)
        run: |
          java -jar target/*.jar --spring.profiles.active=test > app.log 2>&1 &

      - name: Wait for health endpoint
        run: |
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed health check in time"
          cat app.log
          exit 1

      - name: Run k6 smoke
        run: k6 run performance/k6/smoke.js
