# ========================================
# Spring Boot Application Configuration
# ========================================

spring.application.name=BrightNest Academy

# ========================================
# Server Configuration
# ========================================
server.port=${PORT:8080}
# NOTE: context-path removed. API prefix /api is set per-controller via @RequestMapping("/api/...")

# Graceful shutdown (helps during deploys / restarts)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ========================================
# MySQL Database Configuration
# Uses env vars in production; defaults for dev
# ========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:shrishail_academy}?createDatabaseIfNotExist=true&useSSL=${DB_USE_SSL:false}&serverTimezone=UTC&allowPublicKeyRetrieval=true&allowReconnect=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# JPA/Hibernate Configuration
# Use 'validate' in production
# ========================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================================
# JWT Configuration
# - Dev default uses a per-run random secret (avoids committing a real secret).
# - Production must set JWT_SECRET (see application-prod.properties).
# ========================================
jwt.secret=${JWT_SECRET:${random.uuid}${random.uuid}}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.refresh.pepper=${JWT_REFRESH_PEPPER:}
security.cookie.secure=${COOKIE_SECURE:false}
security.cookie.same-site=${COOKIE_SAMESITE:Lax}

# ========================================
# Admin Configuration
# Override via env vars ADMIN_EMAIL / ADMIN_PASSWORD in production.
# ========================================
admin.email=${ADMIN_EMAIL:}
admin.password=${ADMIN_PASSWORD:}

# ========================================
# Logging Configuration
# ========================================
logging.level.com.shrishailacademy=INFO
logging.level.org.springframework.security=WARN

# ========================================
# CORS Configuration
# ========================================
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,http://127.0.0.1:5500,https://brightnest-academy.com,https://www.brightnest-academy.com}

# ========================================
# WhatsApp Notification Configuration
# ========================================
whatsapp.enabled=${WHATSAPP_ENABLED:false}
whatsapp.api.url=${WHATSAPP_API_URL:}
whatsapp.api.key=${WHATSAPP_API_KEY:}
whatsapp.sender.number=${WHATSAPP_SENDER:}

# ========================================
# Rate Limiting
# ========================================
rate.limit.backend=${RATE_LIMIT_BACKEND:inmemory}
rate.limit.api.max=${RATE_LIMIT_API:100}
rate.limit.api.window-seconds=${RATE_LIMIT_API_WINDOW:60}
rate.limit.login.max=${RATE_LIMIT_LOGIN:5}
rate.limit.login.window-seconds=${RATE_LIMIT_WINDOW:60}
rate.limit.trust-forward-headers=${RATE_LIMIT_TRUST_FORWARD_HEADERS:false}

# ========================================
# Redis
# ========================================
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000

# ========================================
# Performance
# ========================================
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================================
# HTTPS Redirect (enable in production)
# ========================================
https.required=${HTTPS_REQUIRED:false}

# ========================================
# Spring Actuator (Monitoring)
# ========================================
management.endpoints.web.exposure.include=health,info,metrics,caches,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=BrightNest Academy
info.app.version=1.0.0
info.app.description=Education Institute Management System

# ========================================
# Caching Configuration
# ========================================
spring.cache.type=simple
spring.cache.cache-names=courses

# ========================================
# File Upload Configuration (Resumes)
# ========================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
resume.upload.dir=${RESUME_UPLOAD_DIR:uploads/resumes}
resume.upload.max-bytes=${RESUME_UPLOAD_MAX_BYTES:5242880}
# Comma-separated
resume.upload.allowed-types=${RESUME_UPLOAD_ALLOWED_TYPES:application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document}
resume.upload.allowed-extensions=${RESUME_UPLOAD_ALLOWED_EXTENSIONS:pdf,doc,docx}
