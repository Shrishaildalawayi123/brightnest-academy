# =============================================
# Production Profile - BrightNest Academy
# Activate via: SPRING_PROFILES_ACTIVE=prod
# All values MUST come from environment variables
# =============================================

# Database: enforce SSL in production
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# Hibernate: NEVER auto-modify schema in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Logging: minimal in production
logging.level.root=WARN
logging.level.com.shrishailacademy=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Connection pool: tuned for production
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:15}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# Server
server.port=${PORT:8080}
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# HTTPS redirect (Render/Cloudflare terminates SSL)
https.required=true
