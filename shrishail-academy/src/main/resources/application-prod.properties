# =============================================
# Production Profile - BrightNest Academy
# Activate via: SPRING_PROFILES_ACTIVE=prod
# All values MUST come from environment variables
# =============================================

# Database: enforce SSL in production
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# Hibernate: NEVER auto-modify schema in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Logging: minimal in production
logging.level.root=WARN
logging.level.com.shrishailacademy=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Connection pool: tuned for production
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:15}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# Actuator: only health and info, no sensitive endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.env.enabled=false
management.endpoint.beans.enabled=false
management.endpoint.configprops.enabled=false
management.endpoint.mappings.enabled=false

# Disable Springdoc/Swagger in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Server: disable error details
server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.whitelabel.enabled=false
server.tomcat.accesslog.enabled=false

# HTTPS redirect (Render/Cloudflare terminates SSL)
https.required=true

# CORS: restrict in production (override via CORS_ORIGINS)
cors.allowed.origins=${CORS_ORIGINS:https://brightnest-academy.com,https://www.brightnest-academy.com}

# Secure cookies in production
security.cookie.secure=true
security.cookie.same-site=None

# JWT: 1-hour token expiry (override via JWT_EXPIRATION env var)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
