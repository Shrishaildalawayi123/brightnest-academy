    <section class="auth-page">
        <div class="container">
            <div class="auth-container">
                <div class="logo-header" style="text-align:center;margin-bottom:2rem;">
                    <div style="font-size:3rem;margin-bottom:0.5rem;"></div>
                    <h1 style="font-size:1.75rem;margin-bottom:0.25rem;">Welcome Back!</h1>
                    <p class="text-muted">Sign in to your account</p>
                </div>

                <div class="alert alert-error" id="errorAlert" style="display:none;background:#FEE2E2;color:#DC2626;border:1px solid #FECACA;padding:0.85rem 1rem;border-radius:8px;margin-bottom:1rem;font-weight:500;"></div>
                <div class="alert alert-success" id="successAlert" style="display:none;background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0;padding:0.85rem 1rem;border-radius:8px;margin-bottom:1rem;font-weight:500;"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" id="loginBtn">Sign In</button>
                </form>

                <div style="text-align:center;margin-top:1.5rem;">
                    <p>Don't have an account? <a href="register.html" style="color:var(--primary-500);font-weight:600;">Register Now</a></p>
                    <p style="margin-top:0.5rem;"><a href="index.html" style="color:var(--navy-400);"> Back to Home</a></p>
                </div>
            </div>
        </div>
    </section>

    <div id="footerPlaceholder"></div>

    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        const footerEl = document.getElementById('footerPlaceholder');
        if (footerEl && window.getFooterHTML) footerEl.innerHTML = getFooterHTML();

        if (Auth.isLoggedIn()) {
            const user = Auth.getCurrentUser();
            window.location.href = user.role === 'ADMIN' ? '/admin-dashboard.html' : '/student-dashboard.html';
        }

        function showError(msg) {
            const el = document.getElementById('errorAlert');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('successAlert').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('successAlert');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('errorAlert').style.display = 'none';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            btn.disabled = true;
            btn.innerHTML = 'Signing in...';
            try {
                const response = await Auth.login(email, password);
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = response.role === 'ADMIN' ? '/admin-dashboard.html' : '/student-dashboard.html';
                }, 800);
            } catch (err) {
                console.error('Login error:', err);
                const msg = err.message || 'Unknown error';
                if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
                    showError('Cannot reach server. Please check if the application is running.');
                } else if (msg.includes('Too many requests')) {
                    showError('Too many login attempts. Please wait and try again.');
                } else {
                    showError(msg);
                }
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        });
    </script>
</body>
</html>
