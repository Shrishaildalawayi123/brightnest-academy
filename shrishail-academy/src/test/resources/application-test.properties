spring.datasource.url=jdbc:h2:mem:shrishailacademy;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.sql.init.mode=never
spring.jpa.open-in-view=false

https.required=false

# Ensure admin bootstrap is disabled in tests
admin.email=
admin.password=

# JWT for tests (do not use in production)
jwt.secret=testsecretkeyforintegrationtestswithsufficientlength1234567890abcdefghijklmnopqrstuvwxyz
jwt.expiration=3600000
rate.limit.backend=inmemory
rate.limit.login.max=${RATE_LIMIT_LOGIN:1000}
rate.limit.login.window-seconds=${RATE_LIMIT_WINDOW:60}
